name: Release Build

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Extract version
      id: get_version
      shell: pwsh
      run: |
        $version = Select-String -Path "src/__init__.py" -Pattern '__version__ = "(.+)"' | ForEach-Object { $_.Matches.Groups[1].Value }
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "Version: $version"
    
    - name: Check if tag exists
      id: check_tag
      shell: pwsh
      run: |
        $version = "${{ steps.get_version.outputs.VERSION }}"
        $tagExists = git tag -l "v$version"
        if ($tagExists) {
          echo "TAG_EXISTS=true" >> $env:GITHUB_OUTPUT
          echo "Tag v$version already exists"
        } else {
          echo "TAG_EXISTS=false" >> $env:GITHUB_OUTPUT
          echo "Tag v$version does not exist"
        }
    
    - name: Build executable
      if: steps.check_tag.outputs.TAG_EXISTS == 'false'
      run: |
        pyinstaller --onefile --windowed --name "hardrive" --icon "hardrive.ico" --distpath "." --add-data "config.json;." --add-data "*.wav;." --hidden-import "pystray._win32" --hidden-import "pystray._util" --hidden-import "PIL._imaging" --hidden-import "psutil" --clean main.py
    
    - name: Create distribution package
      if: steps.check_tag.outputs.TAG_EXISTS == 'false'
      shell: pwsh
      run: |
        $version = "${{ steps.get_version.outputs.VERSION }}"
        
        # Crear directorio de distribución
        New-Item -ItemType Directory -Force -Path "release"
        
        # Copiar ejecutable
        Copy-Item "hardrive.exe" "release\"
        
        # Copiar archivos necesarios
        Copy-Item "config.json" "release\"
        Copy-Item "README.md" "release\"
        Copy-Item "LICENSE" "release\"
        if (Test-Path "sounds") {
          Copy-Item -Recurse "sounds" "release\"
        }
        Copy-Item "*.wav" "release\" -ErrorAction SilentlyContinue
        
        # Crear archivo ZIP
        Compress-Archive -Path "release\*" -DestinationPath "hardrivesound-v$version-Windows.zip" -Force
    
    - name: Generate changelog
      if: steps.check_tag.outputs.TAG_EXISTS == 'false'
      shell: pwsh
      run: |
        $version = "${{ steps.get_version.outputs.VERSION }}"
        $lastTag = git describe --tags --abbrev=0 2>$null

        if ($lastTag) {
          $log = git log "$lastTag..HEAD" --pretty=format:"- %s (%h)" --no-merges
        } else {
          $log = git log --pretty=format:"- %s (%h)" --no-merges -10
        }

        $content = @(
          "## Cambios en v$version",
          "",
          $log,
          "",
          "## Instalación",
          "",
          "1. Descarga el archivo ZIP",
          "2. Extrae el contenido",
          "3. Ejecuta hardrive.exe"
        )
        $content | Out-File -FilePath "CHANGELOG.txt" -Encoding utf8
    
    - name: Create Release
      if: steps.check_tag.outputs.TAG_EXISTS == 'false'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.get_version.outputs.VERSION }}
        name: hardrivesound v${{ steps.get_version.outputs.VERSION }}
        body_path: CHANGELOG.txt
        files: |
          hardrivesound-v${{ steps.get_version.outputs.VERSION }}-Windows.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload build artifact
      if: steps.check_tag.outputs.TAG_EXISTS == 'false'
      uses: actions/upload-artifact@v4
      with:
        name: hardrivesound-v${{ steps.get_version.outputs.VERSION }}
        path: release/
        retention-days: 30
